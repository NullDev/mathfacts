server {
    listen 80;
    listen [::]:80;

    more_set_headers "Server: NullDev OS";
    server_tokens off;

    server_name v1.cx;
    error_log /var/www/v1.cx/log/err.log;
    return 301 https://v1.cx$request_uri;
}

server {
    listen [::]:443 ssl;
    listen 443 ssl;

    server_name v1.cx;

    ssl_certificate /etc/letsencrypt/live/v1.cx/fullchain.pem;   # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/v1.cx/privkey.pem; # managed by Certbot

    include /etc/nginx/snippets/nulldev-ssl.conf;
    include /etc/nginx/snippets/nulldev-headers.conf;

    error_log /var/www/v1.cx/log/err.log;

    error_page 502 /502.html;
    location = /502.html {
        root /var/www/nulldev.org/errors;
        internal;
    }

    location /mathfacts/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header 'Access-Control-Allow-Origin' '';

        proxy_redirect off;
        proxy_pass http://127.0.0.1:3001/;
    }
}
